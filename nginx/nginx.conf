events {
  worker_connections 1024; # Número de conexões simultâneas que um worker pode lidar
}

http {
  # Tipos MIME para que o Nginx sirva os arquivos com o cabeçalho Content-Type correto
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on; # Otimiza o envio de arquivos
  #tcp_nopush     on;

  keepalive_timeout  65; # Tempo limite para conexões keep-alive

  #gzip  on; # Ativar compressão GZIP para otimizar o tamanho dos arquivos

  server {
    listen 80; # Nginx principal escuta na porta 80 do host

    # Encaminha TODAS as requisições que começam com '/api/' para o seu backend Spring Boot
    location /api/ {
      # 'back' é o nome do serviço do seu backend no docker-compose.yml
      # '8080' é a porta que seu Spring Boot escuta dentro do contêiner 'back'
      proxy_pass http://back:8080/;

      # Essas linhas são importantes para que o backend receba o IP real do cliente,
      # o host original e o protocolo (HTTP/HTTPS) correto.
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Se sua API usa tokens de autenticação (como JWT) no cabeçalho Authorization,
      # você pode precisar descomentar e habilitar esta linha para garantir que eles sejam passados.
      proxy_set_header Authorization $http_authorization;
    }

    # Encaminha TODAS as outras requisições para o serviço do seu frontend (SPA)
    # O serviço 'front' já tem seu próprio Nginx interno configurado para SPAs.
    location / {
      # 'front' é o nome do serviço do seu frontend no docker-compose.yml
      # '80' é a porta que o Nginx interno do contêiner 'front' escuta
      proxy_pass http://front:80;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}