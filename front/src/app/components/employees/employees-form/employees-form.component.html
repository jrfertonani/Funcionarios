<div class="containar mt-5">
  <h1>TItle</h1>
  <form >
    <div class="mt-3">
      <label for="form-label">Name</label>
      <input type="text" placeholder="put a name" class="form-Control" controlName="name">
    </div>

    <div class="mt-3">
      <label for="form-label">Email</label>
      <input type="text" placeholder="put a Email" class="form-Control" formControlName="email">
    </div>

    <div class="d-flex mt-3">
      <button class="btn btn-success w-50 mx-1" type="submit">Action</button>
      <a class="btn btn-info w-50" >Return</a>
    </div>


  </form>
</div>
