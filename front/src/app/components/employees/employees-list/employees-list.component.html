<div class="container mt-5">
    <button class="btn btn-success w-100" [routerLink]="['create']" >Register employees</button>
    <div>
        <label class="form-label">to search for:</label>
        <input class="form-control"
            type="text"
            placeholder="What employees are you looking for?"
          />
    </div>
    <div class="container mt-5">
      <table class="table table-hover table-border mt-5">
        <thead class="table-dark">
          <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Email</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>

        <tbody>
          @if(employees.length > 0 ){
            @for(employees of employees; track $index){

              <tr>
                <td>{{ employees.id }}</td>
                <td>{{ employees.name }}</td>
                <td>{{ employees.email}}</td>
                <td>{{ employees.status }}</td>
                <td>
                  <button class="btn btn-warning mx-2" [routerLink]="['/update', employees.id]">Update</button>
                  <button class="btn btn-danger mx-2" >Delete</button>
                </td>
              </tr>
            }
            }@else {
              <tr class="text-certer">
                <td colspan="4">No employees registered!</td>
              </tr>
            }

        </tbody>


      </table>
    </div>


</div>
